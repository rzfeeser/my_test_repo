name: Test GitHub Secrets

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  print-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Echo masked secret
        run: |
          echo "MY_SECRET_KEY is: ${{ secrets.MY_SECRET_KEY }}"

      - name: Echo variables
        run: |
          echo "MY_VAR is: ${{ vars.MY_VAR }}"
